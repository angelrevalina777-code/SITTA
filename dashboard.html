<!-- GREETING --> 
<script>
    function updateDashboardGreeting() {
        const welcomeElement = document.getElementById('welcomeText');
        const roleElement = document.getElementById('userRoleText');
        
        // 1. Ambil Jam Lokal
        const now = new Date();
        const hours = now.getHours();
        let greeting;

        // 2. Logika Waktu
        if (hours >= 5 && hours < 11) {
            greeting = "Selamat Pagi";
        } else if (hours >= 11 && hours < 15) {
            greeting = "Selamat Siang";
        } else if (hours >= 15 && hours < 18) {
            greeting = "Selamat Sore";
        } else {
            greeting = "Selamat Malam";
        }

        // 3. Ambil Data User dari LocalStorage
        const loggedInUser = localStorage.getItem('userNama') || "Admin SITTA";
        const loggedInRole = localStorage.getItem('userRole') || "Administrator - Pusat";

        // 4. Tampilkan Gabungan Sapaan + Nama
        welcomeElement.innerText = `${greeting}, ${loggedInUser}!`;
        roleElement.innerText = "Login sebagai " + loggedInRole;
    }

    // Jalankan fungsi saat halaman dimuat
    window.onload = updateDashboardGreeting;
</script>
