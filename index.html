<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login SITTA - Universitas Terbuka</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body class="login-body">
    <body id="halaman-login"></body>
    <div class="login-card">
        <!-- Logo Section -->
        <div class="logo-wrapper">
            <div class="ut-circle">
                <img src="img/logo_ut.png" alt="UT Logo"> 
                <!-- Pastikan ada file logo_ut.png di folder img Anda -->
            </div>
        </div>
        <div class="header-text">
            <h1>Selamat Datang</h1>
            <p>Aplikasi Pemesanan Bahan Ajar SITTA</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="contoh: admin@ut.ac.id" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Masukkan password" required>
            </div>

            <button type="submit" class="btn-login">Login</button>
        </form>

        <div class="footer-links">
            <a href="#" onclick="popupLupaPassword()">Lupa Password?</a>
            <a href="#" onclick="popupBuatAkun()">Daftar</a>
        </div>
        

        <!-- Akun Demo Box -->
        <div class="demo-box">
            <span>Akun demo:</span>
            <p>admin@ut.ac.id / admin123</p>
            <p>angel@ut.ac.id / angel123</p>
        </div>
    </div>


<!-- FUNGSI POP-UP-->
<!-- 1. Pasang SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- 2. Memanggil data database lokal -->
<script src="js/data.js"></script>

<script>
    // A. Fungsi Pop-up Lupa Password (Diseragamkan)
    function popupLupaPassword() {
        Swal.fire({
            title: 'Lupa Password?',
            text: 'Silakan hubungi administrator IT UT atau gunakan fitur Reset Password di MyUT.',
            icon: 'info',
            confirmButtonText: 'Tutup',
            confirmButtonColor: '#3498db', // Warna Biru Info
            customClass: {
                popup: 'my-rounded-popup',
                confirmButton: 'my-confirm-btn'
            }
        });
    }

    // B. Fungsi Pop-up Daftar Akun Baru (Diseragamkan)
    function popupBuatAkun() {
        Swal.fire({
            title: 'Buat Akun Baru',
            text: 'Kunjungi laman MyUT untuk membuat akun baru.',
            icon: 'question',
            confirmButtonText: 'OK',
            confirmButtonColor: '#6c5ce7', // Warna Ungu
            customClass: {
                popup: 'my-rounded-popup',
                confirmButton: 'my-confirm-btn'
            }
        });
    }

    
    document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault(); 
    
    const emailInput = document.getElementById('email').value.trim();
    const passwordInput = document.getElementById('password').value.trim();

    const user = dataPengguna.find(u => u.email === emailInput && u.password === passwordInput);

    if (user) {
        const namaUser = user.nama || "User";

    // C. Pop-up Login Berhasil (Oranye)
        Swal.fire({
            title: 'Login Berhasil!',
            text: 'Selamat datang, ' + namaUser + '!',
            icon: 'success',
            confirmButtonText: 'Lanjutkan',
            confirmButtonColor: '#e67e22', // Warna Oranye
            allowOutsideClick: false,
            customClass: {
                popup: 'my-rounded-popup',
                confirmButton: 'my-confirm-btn'
            }
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = 'dashboard.html'; 
            }
        });
    } else {

    // D. Pop-up Login Gagal (Biru Gelap)
        Swal.fire({
            title: 'Login Gagal!',
            text: 'Email atau password salah. Silakan coba lagi.',
            icon: 'error',
            confirmButtonText: 'OK',
            confirmButtonColor: '#2c3e50', // Warna Biru Gelap
            customClass: {
                popup: 'my-rounded-popup',
                confirmButton: 'my-confirm-btn'
            }
        });
    }
});
</script>

</body>
</html>
